<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input 7 số</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 60px;
  }

  .boxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .box {
    width: 45px;
    height: 55px;
    border: 2px solid #333;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  input {
    font-size: 18px;
    padding: 10px;
    text-align: center;
  }

  #result {
    margin-top: 15px;
    font-weight: bold;
  }
</style>
</head>

<body>

<h3>Nhập 7 chữ số</h3>

<div class="boxes">
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
</div>

<!-- Ô nhập thật -->
<input 
  type="tel" 
  id="hiddenInput" 
  inputmode="numeric" 
  pattern="[0-9]*" 
  placeholder="Nhập số..." 
  autocomplete="off"
/>

<p id="result"></p>

<script>
  const CONST_A = "1234567";
  const CONST_B = "7654321";

  const input = document.getElementById("hiddenInput");
  const boxes = document.querySelectorAll(".box");
  const result = document.getElementById("result");

  let data = [];

  // Auto focus khi load
  window.addEventListener("load", () => {
    input.focus();
  });

  // Luôn giữ focus (click đâu cũng quay lại)
  document.addEventListener("click", () => {
    input.focus();
  });

  input.addEventListener("input", (e) => {
    let value = e.target.value.replace(/[^0-9]/g, "");

    if (!value) return;

    for (let char of value) {
      if (data.length >= 7) data.shift(); // dịch trái
      data.push(char);
    }

    e.target.value = "";

    updateDisplay();
  });

  function updateDisplay() {
    boxes.forEach((box, i) => {
      box.textContent = data[i] || "";
    });

    if (data.length === 7) {
      let inputStr = data.join("");

      if (inputStr === CONST_A) {
        result.textContent = "Khớp CONST_A";
      } else if (inputStr === CONST_B) {
        result.textContent = "Khớp CONST_B";
      } else {
        result.textContent = "Không khớp";
      }
    } else {
      result.textContent = "";
    }
  }
</script>

</body>
</html>
