  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background: #0f172a;
  color: #fff;
  margin:40px;
}

.container {
  text-align: center;
}

.boxes {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 20px 0;
}

.box {
  width: 45px;
  height: 50px;
  border-radius: 10px;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1e293b;
}

input {
  width: 120px;
  padding: 10px;
  font-size: 18px;
  text-align: center;
  border-radius: 8px;
  border: none;
  outline: none;
}

select {
  padding: 6px 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}

#result {
  margin-top: 15px;
  font-size: 20px;
  font-weight: bold;
}
</style>

/* ⚡ set động */
let set1 = new Set();
let set2 = new Set();

/* 🔥 lọc theo LENGTH */
function rebuildSets() {
  set1 = new Set(CONST_1.filter(x => x.length === LENGTH));
  set2 = new Set(CONST_2.filter(x => x.length === LENGTH));
}

const input = document.getElementById("hiddenInput");
const result = document.getElementById("result");
const boxesContainer = document.getElementById("boxes");
const title = document.getElementById("title");
const select = document.getElementById("lengthSelect");

let data = [];

/* tạo box */
function createBoxes() {
  boxesContainer.innerHTML = "";
  for (let i = 0; i < LENGTH; i++) {
    let div = document.createElement("div");
    div.className = "box";
    boxesContainer.appendChild(div);
  }
}

/* title */
function updateTitle() {
  title.textContent = "Nhập " + LENGTH + " chữ số";
}

/* đổi LENGTH */
select.addEventListener("change", () => {
  LENGTH = parseInt(select.value);
  data = [];
  createBoxes();
  updateTitle();
  result.textContent = "";

  rebuildSets(); // 🔥 quan trọng
});

/* init */
createBoxes();
updateTitle();
rebuildSets();

/* focus */
window.onload = () => input.focus();


/* nhập */
input.addEventListener("input", (e) => {
  let value = e.target.value.replace(/[^0-9]/g, "");
  if (!value) return;

  for (let char of value) {
    if (data.length >= LENGTH) data.shift();
    data.push(char);
  }

  e.target.value = "";
  updateDisplay();
});

/* 🔥 xử lý chính */
function updateDisplay() {
  let boxes = document.querySelectorAll(".box");

  boxes.forEach((box, i) => {
    box.textContent = data[i] || "";
  });

  if (data.length === LENGTH) {
    let str = data.join("");

    if (set1.has(str)) {
      result.textContent = "👉 1";
    } else if (set2.has(str)) {
      result.textContent = "👉 0";
    } else {
      result.textContent = "❌ Không thấy";
    }

  } else {
    result.textContent = "";
  }
}
