<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Công cụ Nhân bản Nội dung</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    width: 95%;
    max-width: 500px;
    background: #1e293b;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  h2 { text-align: center; color: #6366f1; margin-bottom: 20px; }
  
  label { font-size: 0.9em; color: #94a3b8; margin-bottom: 5px; display: block; }
  
  input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #fff;
    box-sizing: border-box;
    font-size: 16px;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
  }

  button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .btn-run { background: #6366f1; color: white; }
  .btn-copy { background: #10b981; color: white; }
  button:hover { opacity: 0.8; transform: translateY(-2px); }

  textarea {
    height: 200px;
    font-family: monospace;
    resize: none;
  }
  
  .status {
    text-align: center;
    font-size: 0.85em;
    color: #38bdf8;
  }
</style>
</head>
<body>

<div class="container">
  <h2>👯 Nhân bản nội dung</h2>

  <label>Nội dung muốn lặp:</label>
  <input type="text" id="sourceText" placeholder="Nhập chữ hoặc số cần nhân bản...">

  <label>Số lượng cần tạo:</label>
  <input type="number" id="repeatCount" placeholder="Ví dụ: 100" min="1">

  <div class="controls">
    <button class="btn-run" onclick="generate()">⚡ Thực thi</button>
    <button class="btn-copy" onclick="copyToClipboard()">📋 Copy kết quả</button>
  </div>

  <label>Kết quả:</label>
  <textarea id="resultArea" readonly placeholder="Kết quả sẽ xuất hiện ở đây..."></textarea>
  
  <div id="msg" class="status"></div>
</div>

<script>
function generate() {
  const text = document.getElementById('sourceText').value;
  const count = parseInt(document.getElementById('repeatCount').value);
  const resultArea = document.getElementById('resultArea');
  const msg = document.getElementById('msg');

  if (!text) {
    alert("Bạn chưa nhập nội dung cần lặp!");
    return;
  }
  if (isNaN(count) || count <= 0) {
    alert("Vui lòng nhập số lượng hợp lệ!");
    return;
  }

  // Tạo mảng và nối lại bằng dấu xuống dòng (hoặc để trống nếu muốn dính liền)
  const result = new Array(count).fill(text).join('\n');
  
  resultArea.value = result;
  msg.innerText = `Đã tạo xong ${count} bản sao!`;
}

function copyToClipboard() {
  const resultArea = document.getElementById('resultArea');
  if (!resultArea.value) {
    alert("Chưa có gì để copy cả!");
    return;
  }

  resultArea.select();
  document.execCommand('copy');
  
  const msg = document.getElementById('msg');
  msg.innerText = "✅ Đã copy vào bộ nhớ tạm!";
  setTimeout(() => msg.innerText = "", 2000);
}
</script>

</body>
</html>
