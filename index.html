<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input 7 số</title>

<style>
  /* Reset nhẹ cho đỡ xấu */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Nền */
body {
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1f2a44, #0f172a);
  color: #fff;
}

/* Container */
.container {
  text-align: center;
}

/* Title */
h3 {
  margin-bottom: 25px;
  font-weight: 500;
  letter-spacing: 1px;
  opacity: 0.85;
}

/* 7 ô hiển thị */
.boxes {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 30px;
}

/* Ô */
.box {
  width: 30px;
  height: 30px;
  border-radius: 16px;
  font-size: 20px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(255, 255, 255, 0.07);
  border: 2px solid rgba(255,255,255,0.12);

  backdrop-filter: blur(10px);

  box-shadow:
    0 8px 25px rgba(0,0,0,0.5),
    inset 0 0 12px rgba(255,255,255,0.05);

  transition: all 0.25s ease;
}

/* Hover cho có tương tác */
.box:hover {
  transform: translateY(-6px) scale(1.05);
  border-color: #38bdf8;
  box-shadow:
    0 0 20px rgba(56,189,248,0.6),
    inset 0 0 10px rgba(56,189,248,0.3);
}

/* Input hiển thị đẹp */
input {
  width: 260px;
  padding: 14px 18px;
  font-size: 20px;
  text-align: center;

  border-radius: 12px;
  border: none;
  outline: none;

  color: #fff;
  background: rgba(255,255,255,0.08);

  backdrop-filter: blur(8px);

  box-shadow:
    inset 0 0 12px rgba(0,0,0,0.6),
    0 4px 15px rgba(0,0,0,0.4);

  transition: 0.3s;
}

/* Focus glow */
input:focus {
  box-shadow:
    0 0 15px #22d3ee,
    inset 0 0 10px rgba(34,211,238,0.4);
  transform: scale(1.03);
}

/* Placeholder */
input::placeholder {
  color: rgba(255,255,255,0.5);
}

/* Result */
#result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: 500;
  min-height: 24px;
  opacity: 0.9;
}

/* Animation nhẹ */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.box, input, #result {
  animation: fadeUp 0.5s ease;
}
</style>
</head>

<body>
<div class="container">
  <!-- toàn bộ nội dung -->

<h3>Nhập 7 chữ số</h3>

<div class="boxes">
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
</div>

<!-- Ô nhập thật -->
<input 
  type="tel" 
  id="hiddenInput" 
  inputmode="numeric" 
  pattern="[0-9]*" 
  placeholder="Nhập số..." 
  autocomplete="off"
/>

<p id="result"></p>
    </div>
<script>
  const CONST_A = "1234567";
  const CONST_B = "7654321";

  const input = document.getElementById("hiddenInput");
  const boxes = document.querySelectorAll(".box");
  const result = document.getElementById("result");

  let data = [];

  // Auto focus khi load
  window.addEventListener("load", () => {
    input.focus();
  });

  // Luôn giữ focus (click đâu cũng quay lại)
  document.addEventListener("click", () => {
    input.focus();
  });

  input.addEventListener("input", (e) => {
    let value = e.target.value.replace(/[^0-9]/g, "");

    if (!value) return;

    for (let char of value) {
      if (data.length >= 7) data.shift(); // dịch trái
      data.push(char);
    }

    e.target.value = "";

    updateDisplay();
  });

  function updateDisplay() {
    boxes.forEach((box, i) => {
      box.textContent = data[i] || "";
    });

    if (data.length === 7) {
      let inputStr = data.join("");

      if (inputStr === CONST_A) {
        result.textContent = "Khớp CONST_A";
      } else if (inputStr === CONST_B) {
        result.textContent = "Khớp CONST_B";
      } else {
        result.textContent = "Không khớp";
      }
    } else {
      result.textContent = "";
    }
  }
</script>

</body>
</html>
