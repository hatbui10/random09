
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check số linh hoạt</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background: #0f172a;
  color: #fff;
  margin: 40px;
}

.container {
  text-align: center;
}

.boxes {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 20px 0;
}

.box {
  width: 45px;
  height: 50px;
  border-radius: 10px;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1e293b;
}

input {
  width: 120px;
  padding: 10px;
  font-size: 18px;
  text-align: center;
  border-radius: 8px;
  border: none;
  outline: none;
}

select {
  padding: 6px 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}

#result {
  margin-top: 15px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h3 id="title"></h3>

<select id="lengthSelect">
  <option value="5">5 ô</option>
  <option value="4" selected>4 ô</option>
  <option value="6">6 ô</option>
  <option value="3">3 ô</option>
</select>

<div class="boxes" id="boxes"></div>

<input type="tel" id="hiddenInput" inputmode="numeric" placeholder="..." />

<p id="result"></p>

</div>

<script>
let LENGTH = 5;

/* ⚡ set động */
let set1 = new Set();
let set2 = new Set();

const input = document.getElementById("hiddenInput");
const result = document.getElementById("result");
const boxesContainer = document.getElementById("boxes");
const title = document.getElementById("title");
const select = document.getElementById("lengthSelect");

let data = [];

/* tạo box */
function createBoxes() {
  boxesContainer.innerHTML = "";
  for (let i = 0; i < LENGTH; i++) {
    let div = document.createElement("div");
    div.className = "box";
    boxesContainer.appendChild(div);
  }
}

/* title */
function updateTitle() {
  title.textContent = "Nhập " + LENGTH + " chữ số";
}

/* đổi LENGTH */
select.addEventListener("change", () => {
  LENGTH = parseInt(select.value);
  data = [];
  createBoxes();
  updateTitle();
  result.textContent = "";

  rebuildSets(); // 🔥 quan trọng
});

/* 🔥 fetch dữ liệu từ IPFS */
let CONST_1 = [], CONST_2 = [];

async function loadIPFSData() {
  try {
    const IPFS_URL = "https://tomato-delicate-zebra-533.mypinata.cloud/ipfs/bafkreih2ssy5qtq372ggqpcbbffoqkjytpnds55iakcadvmckhfum73feu";

    const res = await fetch(IPFS_URL);
    const json = await res.json();

    CONST_1 = json.CONST_1 || [];
    CONST_2 = json.CONST_2 || [];

    rebuildSets();
    createBoxes();
    updateTitle();

  } catch (err) {
    console.error("Lỗi khi load IPFS:", err);
    result.textContent = "❌ Không thể load dữ liệu";
  }
}

/* 🔥 rebuild sets theo LENGTH */
function rebuildSets() {
  set1 = new Set(CONST_1.filter(x => x.length === LENGTH));
  set2 = new Set(CONST_2.filter(x => x.length === LENGTH));
}

/* focus */
window.onload = () => {
  input.focus();
  loadIPFSData();
};

/* nhập */
input.addEventListener("input", (e) => {
  let value = e.target.value.replace(/[^0-9]/g, "");
  if (!value) return;

  for (let char of value) {
    if (data.length >= LENGTH) data.shift();
    data.push(char);
  }

  e.target.value = "";
  updateDisplay();
});

/* 🔥 xử lý chính */
function updateDisplay() {
  let boxes = document.querySelectorAll(".box");

  boxes.forEach((box, i) => {
    box.textContent = data[i] || "";
  });

  if (data.length === LENGTH) {
    let str = data.join("");

    if (set1.has(str)) {
      result.textContent = "👉 1";
    } else if (set2.has(str)) {
      result.textContent = "👉 0";
    } else {
      result.textContent = "❌ Không thấy";
    }

  } else {
    result.textContent = "";
  }
}
</script>

</body>
</html>
